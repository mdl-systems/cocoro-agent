# cocoro-agent — Docker Compose
# cocoro-coreのcocoro-networkに参加して、DBとRedisを共有する
#
# 【単体ノード】cocoro-coreと同一miniPCで動かす場合
#   docker compose up -d
#
# 【専門職ノード】別のminiPCで特定ロール専用に動かす場合
#   cp .env.example .env && nano .env
#   docker compose up -d

services:
  cocoro-agent:
    build:
      context: ../../ # repo root
      dockerfile: infra/docker/Dockerfile
    container_name: cocoro-agent
    ports:
      - "${AGENT_PORT:-8002}:8002"
    environment:
      # cocoro-coreとの接続（Docker内部通信またはIP直指定）
      - COCORO_CORE_URL=${COCORO_CORE_URL:-http://cocoro-core:8001}
      # 認証（cocoro-coreと同じキーを使用）
      - COCORO_API_KEY=${COCORO_API_KEY:-cocoro-dev-2026}
      # このサービスのポート
      - AGENT_PORT=${AGENT_PORT:-8002}
      # Webhook署名
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-cocoro-webhook-secret}
      # 共有インフラ（cocoro-coreと同じDB・Redis）
      - DATABASE_URL=postgresql://cocoro:${POSTGRES_PASSWORD:-cocoro_secret}@cocoro-postgres:5432/cocoro_db
      - REDIS_URL=redis://cocoro-redis:6379/0
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # ── ロール設定（Phase 4: 専門職ノード） ──────────────────────────
      # このノードが担当するロール（カンマ区切り、未設定=全ロール）
      - AGENT_ROLES=${AGENT_ROLES:-researcher,engineer,lawyer,accountant,financial_advisor}
      # このノードの識別子（複数miniPC構成時に使用）
      - NODE_ID=${NODE_ID:-main-node}
      # このノードの表示名
      - NODE_NAME=${NODE_NAME:-メインノード}
    networks:
      - cocoro-net
    depends_on:
      - cocoro-core-check
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8002/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped

  # cocoro-coreが起動しているか確認するダミーサービス
  # 専門職ノード（別miniPC）のとき COCORO_CORE_URL をIPに変えれば外部チェックになる
  cocoro-core-check:
    image: curlimages/curl:latest
    command: >
      sh -c "until curl -sf ${COCORO_CORE_URL:-http://cocoro-core:8001}/health; do
        echo 'Waiting for cocoro-core...'; sleep 3; done;
        echo 'cocoro-core is ready'"
    networks:
      - cocoro-net
    restart: "no"

networks:
  cocoro-net:
    external: true # cocoro-coreが作成したネットワークを使用
    name: ${DOCKER_NETWORK:-cocoro-network} # 実際のネットワーク名を .env で上書き可
